# Render Blueprint: Laravel + Vite via Docker (PHP, Composer, and npm run build happen in the Dockerfile).
# Apply from the Render dashboard: New → Blueprint → connect this repo, or set an existing Web Service to
# Environment: Docker and clear custom Build/Start commands so the Dockerfile is used.
#
# Required dashboard/env vars (set in Render → your service → Environment):
#   APP_KEY           output of: php artisan key:generate --show
#   APP_URL           https://<your-service>.onrender.com
#   DATABASE_URL      if using Render Postgres: Internal Database URL; also set DB_CONNECTION=pgsql
#                     (config/database.php reads DATABASE_URL when DB_URL is unset)
# Optional (no Shell needed): first Filament login — set on deploy, then clear ADMIN_PASSWORD after use
#   ADMIN_EMAIL       e.g. you@company.com
#   ADMIN_PASSWORD    strong one-time password
#   ADMIN_NAME        optional display name (default Admin)
services:
  - type: web
    name: growthx-estates
    runtime: docker
    dockerfilePath: ./Dockerfile
    # /up avoids DB on health checks; / hits the homepage which queries the database
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: COMPOSER_ALLOW_SUPERUSER
        value: "1"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
